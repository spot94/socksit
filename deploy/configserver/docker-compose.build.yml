# Override to BUILD the image locally instead of pulling it from GHCR. Combine
# with the base + an env override and pass --build, e.g.:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml -f docker-compose.dev.yml --env-file .env.dev up -d --build
services:
  configserver:
    build:
      context: ../..
      dockerfile: deploy/configserver/Dockerfile
    image: socksit-configserver:local
    pull_policy: build
