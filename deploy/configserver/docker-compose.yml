# Base compose for the SocksIt config server. By default it PULLS the image from
# GitHub Container Registry (built by .github/workflows/configserver-image.yml).
# Combine with an env-specific override, e.g.:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
# To build the image locally instead of pulling, add docker-compose.build.yml:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml -f docker-compose.dev.yml up -d --build
services:
  configserver:
    # Pin a version by setting CONFIGSERVER_IMAGE=ghcr.io/<owner>/socksit-configserver:X.Y.Z
    image: ${CONFIGSERVER_IMAGE:-ghcr.io/spot94/socksit-configserver:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      LISTEN: ":8080"
      IDLE_TIMEOUT: "30m"
      # ADMIN_PASSWORD (from the env file / a docker secret) bootstraps the admin on
      # first run. Omit it to instead set the password via the first-run web page.
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # Set true only when a TLS-terminating reverse proxy sits in front.
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
    volumes:
      - configdata:/data
volumes:
  configdata:
