name: configserver image

# Builds the config server container and pushes it to GitHub Container Registry
# (ghcr.io/<owner>/socksit-configserver). Runs on pushes to main (-> :latest) and
# on version tags (-> :X.Y.Z). The default compose pulls :latest from here.
#
# The paths filter means CLIENT-ONLY changes don't rebuild the image — it only
# runs when a file the server binary actually depends on changes (its packages,
# the Dockerfile, go.mod/go.sum, or this workflow). internal/config is shared with
# the client, so a config-schema change does (correctly) rebuild it.
#
# GHCR packages start PRIVATE. After the first push, make the package public
# (repo → Packages → socksit-configserver → Package settings → Change visibility)
# so `docker compose pull` works without a login, or run `docker login ghcr.io`.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cmd/configserver/**'
      - 'internal/configserver/**'
      - 'internal/config/**'
      - 'deploy/configserver/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/configserver-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/socksit-configserver
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/configserver/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
